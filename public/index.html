<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyDramaList Addon Builder</title>
<style>
    body {
        font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
        background: linear-gradient(135deg, #f7f2ff, #ffeef6);
        margin: 0;
        padding: 0;
        color: #333;
    }

    .container {
        max-width: 700px;
        margin: 60px auto;
        background: white;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        border: 1px solid #f0e6ff;
    }

    h1 {
        text-align: center;
        font-weight: 700;
        font-size: 32px;
        margin-bottom: 10px;
        color: #6a4bc4;
    }

    h2 {
        text-align: center;
        font-weight: 400;
        font-size: 18px;
        margin-top: 0;
        color: #a38bd4;
        letter-spacing: 0.5px;
    }

    label {
        font-weight: 600;
        margin-top: 20px;
        display: block;
        color: #6a4bc4;
    }

    input, textarea {
        width: 100%;
        padding: 14px;
        margin-top: 6px;
        border-radius: 12px;
        border: 1px solid #d8c9ff;
        background: #faf7ff;
        font-size: 15px;
        transition: 0.2s;
    }

    input:focus, textarea:focus {
        border-color: #b79aff;
        outline: none;
        background: #fff;
    }

    textarea {
        resize: none;
    }

    .checkboxes {
        margin-top: 10px;
        padding: 15px;
        background: #faf7ff;
        border-radius: 12px;
        border: 1px solid #e6d9ff;
    }

    .checkboxes label {
        font-weight: 500;
        color: #555;
        margin: 6px 0;
    }

    button {
        width: 100%;
        padding: 16px;
        margin-top: 25px;
        background: #6a4bc4;
        color: white;
        border: none;
        border-radius: 14px;
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #5739b0;
    }

    .output {
        margin-top: 25px;
        padding: 20px;
        background: #f7f2ff;
        border-radius: 14px;
        border: 1px solid #e6d9ff;
        font-size: 15px;
        word-break: break-all;
        color: #4a3a8c;
    }

    .hangul {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        color: #b79aff;
        letter-spacing: 2px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>MDL Addon Builder</h1>
    <h2>나만의 드라마 애드온 만들기</h2>

    <label>MDL Profile URL</label>
    <input id="profile" placeholder="https://mydramalist.com/profile/USERNAME">

    <label>MDL List URLs (one per line)</label>
    <textarea id="lists" rows="5" placeholder="https://mydramalist.com/list/12345abcd"></textarea>

    <label>Include Popular / Trending</label>
    <div class="checkboxes">
        <label><input type="checkbox" id="kr"> 🇰🇷 Korea</label><br>
        <label><input type="checkbox" id="jp"> 🇯🇵 Japan</label><br>
        <label><input type="checkbox" id="cn"> 🇨🇳 China</label><br>
        <label><input type="checkbox" id="th"> 🇹🇭 Thailand</label><br>
        <label><input type="checkbox" id="hk"> 🇭🇰 Hong Kong</label><br>
    </div>

    <button onclick="generate()">Generate Addon URL</button>

    <div class="output" id="output"></div>

    <div class="hangul">드라마는 인생이다 ✨</div>
</div>

<script>
function extractUsername(url) {
  const m = url.match(/profile\/([^\/]+)/);
  return m ? m[1] : null;
}

function extractListId(url) {
  const m = url.match(/list\/([^\/]+)/);
  return m ? m[1] : null;
}

function generate() {
  const profile = document.getElementById("profile").value.trim();
  const listsRaw = document.getElementById("lists").value.trim().split("\n");

  const username = extractUsername(profile);

  const lists = listsRaw
    .map(l => extractListId(l))
    .filter(Boolean)
    .map(id => ({ id }));

  const includePopularTrending = {
    kr: document.getElementById("kr").checked,
    jp: document.getElementById("jp").checked,
    cn: document.getElementById("cn").checked,
    th: document.getElementById("th").checked,
    hk: document.getElementById("hk").checked
  };

  const config = {
    user: username,
    lists,
    includePopularTrending
  };

  const base64 = btoa(JSON.stringify(config));

  const url = `${window.location.origin}/manifest.json?config=${base64}`;

  document.getElementById("output").innerText = url;
}
</script>

</body>
</html>
